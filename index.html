<!DOCTYPE html>
<html>
<head>
  <title>Smart Traffic System</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: black;
      color: white;
    }

    .light {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px auto;
      background: gray;
    }

    button {
      padding: 12px;
      margin: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    .pedestrian {
      background: orange;
      color: white;
    }
  </style>
</head>
<body>

<h1>🚦 Smart Traffic System</h1>

<div id="red" class="light"></div>
<div id="yellow" class="light"></div>
<div id="green" class="light"></div>

<h2>Countdown: <span id="count">0</span></h2>

<button class="pedestrian" onclick="requestPedestrian()">🚶 Request Crossing</button>

<script>
function requestPedestrian() {
  fetch('/pedestrian');
}

function update() {
  fetch('/status')
    .then(res => res.json())
    .then(data => {
      document.getElementById("count").innerText = data.countdown;

      document.getElementById("red").style.background =
        data.light === "RED" ? "red" : "gray";

      document.getElementById("yellow").style.background =
        data.light === "YELLOW" ? "yellow" : "gray";

      document.getElementById("green").style.background =
        data.light === "GREEN" ? "green" : "gray";
    });
}

setInterval(update, 1000);
</script>

</body>
</html>
